[build]
  command = "npm run build"
  publish = ".next"
  environment = { NODE_VERSION = "18" }

[functions]
  node_bundler = "esbuild"

  # Keep externalizing heavy packages
  external_node_modules = [
    "sharp",
    "moment",
    "pdfkit",
    "aws-sdk",
    "@aws-sdk/*",
    "puppeteer-core"
  ]

  # You probably want to remove public/**/* to prevent bundling large files
  included_files = [
    "./next.config.js"
  ]

[[plugins]]
  package = "@netlify/plugin-nextjs"

  [plugins.inputs]
  disableImageOptimization = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
